name: Automatic Google Drive Catalog Sync

on:
  repository_dispatch:
    types: [drive-updated]
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours automatically
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Drive Sync Engine (Pushes to Qdrant Cloud)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python sync_drive.py

      - name: Clean up temporary PDFs
        if: always()
        run: rm -rf pdf_catalogs/
