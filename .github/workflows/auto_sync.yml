name: Automatic Google Drive Catalog Sync

on:
  repository_dispatch:
    types: [drive-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache PyTorch & DINOv2 Weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch
          key: torch-dinov2-v1

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest repository state
        run: |
          git config --global user.name 'Catalog-Sync-Bot'
          git config --global user.email 'bot@github.com'
          git pull origin main --rebase

      - name: Run Drive Sync Engine (Incremental)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python sync_drive.py

      - name: Clean up heavy raw PDFs
        run: |
          rm -rf pdf_catalogs/

      - name: Commit and push updated index and images
        run: |
          # Force add all generated database files and images
          git add -f faiss_catalog.index catalog_meta.pkl catalog_pages/
          
          if git status --porcelain | grep -E 'faiss_catalog|catalog_meta|catalog_pages'; then
            git commit -m "Auto-updated catalog index and page images"
            
            # Stash any remaining temporary untracked files before final rebase
            git stash --include-untracked || true
            git pull origin main --rebase
            git stash pop || true
            
            git push origin main
          else
            echo "No new catalog changes detected to commit."
          fi
