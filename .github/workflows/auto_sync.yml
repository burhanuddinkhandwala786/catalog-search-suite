name: Automatic Google Drive Catalog Sync

on:
  repository_dispatch:
    types: [drive-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Drive Sync Engine
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python sync_drive.py

      - name: Clean up heavy PDFs before commit
        run: |
          rm -rf pdf_catalogs/

      - name: Commit and push updated vector database & page images
        run: |
          git config --global user.name 'Catalog-Sync-Bot'
          git config --global user.email 'bot@github.com'
          
          # Pull latest main changes to prevent push conflicts
          git pull origin main --rebase
          
          # Force add generated database & extracted page images
          git add -f faiss_catalog.index catalog_meta.pkl catalog_pages/
          
          if git status --porcelain | grep -E 'faiss_catalog|catalog_meta|catalog_pages'; then
            git commit -m "Auto-updated catalog index from Google Drive"
            git push origin main
          else
            echo "No changes detected to commit."
          fi
