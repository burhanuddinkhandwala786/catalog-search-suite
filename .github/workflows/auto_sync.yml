name: Automatic Google Drive Catalog Sync

on:
  repository_dispatch:
    types: [drive-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Drive Sync Engine
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python sync_drive.py

      - name: Commit and push updated vector database & page images
        run: |
          git config --global user.name 'Catalog-Sync-Bot'
          git config --global user.email 'bot@github.com'
          
          # Pull latest changes first
          git pull origin main --rebase
          
          # Safely stage files if they exist
          [ -f faiss_catalog.index ] && git add -f faiss_catalog.index
          [ -f catalog_meta.pkl ] && git add -f catalog_meta.pkl
          [ -d catalog_pages ] && git add -f catalog_pages/
          [ -d pdf_catalogs ] && git add -f pdf_catalogs/
          
          if git status --porcelain | grep -E 'faiss_catalog|catalog_meta|catalog_pages|pdf_catalogs'; then
            git commit -m "Auto-updated catalog index and page images [skip ci]"
            git push origin main
          else
            echo "No changes or index files to commit."
          fi
