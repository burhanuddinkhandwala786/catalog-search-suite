name: Prevent Streamlit Hibernation Daily

on:
  schedule:
    # Runs automatically EVERY DAY at 04:00 UTC (9:30 AM IST)
    - cron: '0 4 * * *'
  # Allows you to manually trigger it anytime from GitHub's "Actions" tab to test it
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Playwright & Chromium Browser
        run: |
          pip install playwright
          playwright install chromium

      - name: Simulate Daily Real User Visit to Direct Streamlit App
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import sys

          try:
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  print('Navigating directly to catalog-search-suite.streamlit.app...')
                  page.goto('https://catalog-search-suite.streamlit.app', timeout=90000)
                  page.wait_for_timeout(15000)
                  print('Successfully established active WebSocket session with Streamlit!')
                  browser.close()
          except Exception as e:
              print(f'Error during ping session: {e}')
              sys.exit(1)
          "
